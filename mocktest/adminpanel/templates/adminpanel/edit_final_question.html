{% extends "adminpanel/base.html" %}
{% block title %}Edit Final Question{% endblock %}
{% block page_title %}Edit Final Question{% endblock %}

{% block content %}
<style>
  .form-container {
    width: 80%;
    margin: 20px auto;
    background: #fff;
    padding: 25px;
    border-radius: 8px;
    box-shadow: 0 0 8px rgba(0,0,0,0.1);
  }
  label {
    font-weight: bold;
    display: block;
    margin-top: 10px;
  }
  input[type="text"], select, textarea {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    border: 1px solid #ccc;
    border-radius: 5px;
  }
  button {
    margin-top: 15px;
    padding: 10px 20px;
    background-color: #11224E;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }
  button:hover {
    background-color: #0d1b3b;
  }
</style>

<div class="form-container">
  <h2>Edit Final Question</h2>

  <form method="POST">
    {% csrf_token %}

    <label>Subject:</label>
    <select name="subject" required>
      {% for s in subjects %}
        <option value="{{ s.id }}" {% if s.id == question.subject.id %}selected{% endif %}>{{ s.name }}</option>
      {% endfor %}
    </select>

    <label>Question Text:</label>
    <textarea name="question_text" rows="3" required>{{ question.question_text }}</textarea>

    <label>Option 1:</label>
    <input type="text" name="option1" value="{{ question.option1 }}" required>

    <label>Option 2:</label>
    <input type="text" name="option2" value="{{ question.option2 }}" required>

    <label>Option 3:</label>
    <input type="text" name="option3" value="{{ question.option3 }}" required>

    <label>Option 4:</label>
    <input type="text" name="option4" value="{{ question.option4 }}" required>

    <label>Correct Answer:</label>
    <input type="text" name="correct_answer" value="{{ question.correct_answer }}" required>

    <button type="submit">Save Changes</button>
  </form>
</div>
{% endblock %}
