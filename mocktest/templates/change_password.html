{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Change Password</title>
  <link rel="stylesheet" href="../static/css/login.css">

  <style>
    .password-container {
      position: relative;
      width: 300px;
      margin-bottom: 12px;
    }

    .password-container input {
      width: 100%;
      padding: 12px 40px 12px 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .toggle-icon {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="main-container">
    <div class="login-container">

      <img src="../static/images/technokraft-logo.png" class="logo" style="width:300px;height:100px;">
      <h2>Change Password</h2>

      {% if messages %}
        {% for message in messages %}
          <div class="message {{ message.tags }}">{{ message }}</div>
        {% endfor %}
      {% endif %}

      <form method="post">
        {% csrf_token %}

        <div class="password-container">
          <input type="password" name="new_password" id="new_password" placeholder="New Password" required>
          <span class="toggle-icon" onclick="togglePassword('new_password', this)">👁️</span>
        </div>

        <div class="password-container">
          <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm Password" required>
          <span class="toggle-icon" onclick="togglePassword('confirm_password', this)">👁️</span>
        </div>

        <button type="submit" style="background:#007bff;">Update Password</button>
      </form>

    </div>
  </div>

  <script>
    function togglePassword(id, icon) {
      const field = document.getElementById(id);
      field.type = field.type === "password" ? "text" : "password";
      icon.textContent = field.type === "password" ? "👁️" : "🙈";
    }
  </script>
</body>
</html>
