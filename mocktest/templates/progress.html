{% extends "student_dashboard.html" %}
{% block content %}

<style>
.progress-wrapper {
    margin-left: 3%;
    margin-top: 20px;
    font-family: Arial, sans-serif;
}

.select-box {
    margin-bottom: 20px;
    padding: 10px;
    font-size: 16px;
}

.chart-container {
    width: 900px;
    height: 450px;
    padding: 20px;
    border-radius: 12px;
    background: #ffffff;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

.no-data {
    margin-top: 30px;
    color: #888;
    font-size: 18px;
}
</style>

<div class="progress-wrapper">

    <h2>📈 Student Progress Analysis</h2>

    <!-- Subject Dropdown -->
    <form method="get">
        <label>Select Subject:</label><br>
        <select class="select-box" name="subject" onchange="this.form.submit()">
            <option value="">-- Select --</option>

            {% for subj in subjects %}
                <option value="{{ subj.id }}"
                    {% if selected_subject and selected_subject.id == subj.id %} selected {% endif %}>
                    {{ subj.name }}
                </option>
            {% endfor %}
        </select>
    </form>

    {% if chart_data %}
    
    <!-- Chart Container -->
    <div class="chart-container">
        <canvas id="progressChart"></canvas>
    </div>

    <!-- Chart JS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
    const ctx = document.getElementById("progressChart");

    const labels = [{% for item in chart_data %}"{{ item.date }}",{% endfor %}];
    const scores = [{% for item in chart_data %}{{ item.score }},{% endfor %}];
    const percentages = [{% for item in chart_data %}{{ item.percentage }},{% endfor %}];

    new Chart(ctx, {
        type: "line",
        data: {
            labels: labels,
            datasets: [
                {
                    label: "Score",
                    data: scores,
                    borderColor: "rgba(54, 162, 235, 1)",
                    backgroundColor: "rgba(54, 162, 235, 0.3)",
                    borderWidth: 3,
                    tension: 0.3,
                    fill: true,
                    pointRadius: 5
                },
                {
                    label: "Percentage %",
                    data: percentages,
                    borderColor: "rgba(255, 99, 132, 1)",
                    backgroundColor: "rgba(255, 99, 132, 0.3)",
                    borderWidth: 3,
                    tension: 0.3,
                    fill: true,
                    pointRadius: 5
                }
            ]
        },

        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true,
                    max: 100,
                    title: {
                        display: true,
                        text: "Performance",
                        font: { size: 16 }
                    }
                },
                x: {
                    title: {
                        display: true,
                        text: "Attempt Dates",
                        font: { size: 16 }
                    }
                }
            }
        }
    });
    </script>

    {% else %}
        <p class="no-data">No progress data found for this subject.</p>
    {% endif %}

</div>

{% endblock %}
